<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>歇后语大全</title>
    <script type="module" src="https://esm.sh/react@19"></script>
    <script type="module" src="https://esm.sh/react-dom@19/client"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      :root {
        --bg-color: #f9f7f2;
        --primary-text: #2c3e50;
        --accent-color: #a61b29;
        --border-color: #e0ddd5;
        --active-item: #ffffff;
        --hover-bg: #f5f3ed;
      }
      
      body {
        font-family: "PingFang SC", "Microsoft YaHei", serif;
        background-color: var(--bg-color);
        color: var(--primary-text);
      }
      
      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 16px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">加载中...</div>
    </div>
    <script type="module">
      import React, { useEffect, useState, useRef, useMemo, useCallback } from 'https://esm.sh/react@19'
      import { createRoot } from 'https://esm.sh/react-dom@19/client'
      
      const defaultData = [
        {
          id: 1,
          riddle: '小葱拌豆腐',
          answer: '一清二白',
          explanation: '比喻清清楚楚，明明白白。也指非常清白，没有污点。'
        },
        {
          id: 2,
          riddle: '哑巴吃黄连',
          answer: '有苦说不出',
          explanation: '比喻有苦难言，无法诉说自己的委屈或痛苦。'
        },
        {
          id: 3,
          riddle: '竹篮打水',
          answer: '一场空',
          explanation: '比喻白费力气，没有成果，劳而无功。'
        },
        {
          id: 4,
          riddle: '芝麻开花',
          answer: '节节高',
          explanation: '比喻生活、事业等不断向上发展，越来越好。'
        },
        {
          id: 5,
          riddle: '丈二和尚',
          answer: '摸不着头脑',
          explanation: '比喻弄不清情况，搞不明白是怎么回事。'
        }
      ]
      
      function fuzzySearch(data, keyword) {
        if (!keyword || !keyword.trim()) return data
        const lowerKeyword = keyword.toLowerCase()
        return data.filter(item => {
          const riddleMatch = item.riddle.toLowerCase().includes(lowerKeyword)
          const answerMatch = item.answer.toLowerCase().includes(lowerKeyword)
          const explanationMatch = item.explanation && item.explanation.toLowerCase().includes(lowerKeyword)
          return riddleMatch || answerMatch || explanationMatch
        })
      }
      
      function Xiehouyu({ enterAction }) {
        const [allData, setAllData] = useState(defaultData)
        const [filteredData, setFilteredData] = useState(defaultData)
        const [selectedIndex, setSelectedIndex] = useState(0)
        const [searchText, setSearchText] = useState('')
        const [loading, setLoading] = useState(true)
        const [currentPage, setCurrentPage] = useState(1)
        const [pageSize, setPageSize] = useState(20)
        const listRef = useRef(null)
        
        useEffect(() => {
          fetch('data.json')
            .then(res => res.json())
            .then(jsonData => {
              if (Array.isArray(jsonData) && jsonData.length > 0) {
                setAllData(jsonData)
                setFilteredData(jsonData)
              }
            })
            .catch(err => console.error('加载数据失败:', err))
            .finally(() => setLoading(false))
        }, [])
        
        useEffect(() => {
          if (enterAction && enterAction.payload) {
            const payload = typeof enterAction.payload === 'string' 
              ? enterAction.payload 
              : (enterAction.payload[0] || '')
            setSearchText(payload)
            performSearch(payload)
          }
        }, [enterAction])
        
        const performSearch = useCallback((keyword) => {
          const results = fuzzySearch(allData, keyword)
          setFilteredData(results)
          setCurrentPage(1)
          setSelectedIndex(0)
        }, [allData])
        
        const handleSearch = (e) => {
          const text = e.target.value
          setSearchText(text)
          performSearch(text)
        }
        
        const paginatedData = useMemo(() => {
          const startIndex = (currentPage - 1) * pageSize
          return filteredData.slice(startIndex, startIndex + pageSize)
        }, [filteredData, currentPage, pageSize])
        
        const totalPages = useMemo(() => {
          return Math.ceil(filteredData.length / pageSize)
        }, [filteredData.length, pageSize])
        
        useEffect(() => {
          const handleKeyDown = (e) => {
            if (e.key === 'ArrowDown') {
              e.preventDefault()
              setSelectedIndex(prev => Math.min(paginatedData.length - 1, prev + 1))
            } else if (e.key === 'ArrowUp') {
              e.preventDefault()
              setSelectedIndex(prev => Math.max(0, prev - 1))
            } else if (e.key === 'PageDown') {
              e.preventDefault()
              if (currentPage < totalPages) {
                setCurrentPage(prev => prev + 1)
                setSelectedIndex(0)
              }
            } else if (e.key === 'PageUp') {
              e.preventDefault()
              if (currentPage > 1) {
                setCurrentPage(prev => prev - 1)
                setSelectedIndex(0)
              }
            }
          }
          window.addEventListener('keydown', handleKeyDown)
          return () => window.removeEventListener('keydown', handleKeyDown)
        }, [paginatedData.length, currentPage, totalPages])
        
        const handlePageChange = (page) => {
          setCurrentPage(page)
          setSelectedIndex(0)
        }
        
        const handlePageSizeChange = (size) => {
          setPageSize(size)
          setCurrentPage(1)
          setSelectedIndex(0)
        }
        
        const currentItem = useMemo(() => {
          const startIndex = (currentPage - 1) * pageSize
          return filteredData[startIndex + selectedIndex] || {}
        }, [filteredData, currentPage, pageSize, selectedIndex])
        
        if (loading) {
          return React.createElement('div', { className: 'utools-container' },
            React.createElement('div', { className: 'loading' }, '加载中...')
          )
        }
        
        return React.createElement('div', { className: 'utools-container' },
          React.createElement('div', { className: 'list-panel' },
            React.createElement('div', { className: 'search-box' },
              React.createElement('input', {
                type: 'text',
                placeholder: '搜索歇后语...',
                value: searchText,
                onChange: handleSearch,
                className: 'search-input'
              })
            ),
            React.createElement('div', { className: 'list-info' },
              `共 ${filteredData.length} 条，第 ${currentPage}/${totalPages} 页`
            ),
            React.createElement('div', { className: 'list-content', ref: listRef },
              paginatedData.length > 0 
                ? paginatedData.map((item, index) =>
                    React.createElement('div', {
                      key: item.id,
                      className: `list-item ${index === selectedIndex ? 'active' : ''}`,
                      onClick: () => setSelectedIndex(index),
                      title: item.riddle
                    }, React.createElement('div', { className: 'riddle' }, item.riddle))
                  )
                : React.createElement('div', { className: 'no-result' }, '暂无匹配结果')
            ),
            totalPages > 1 && React.createElement('div', { className: 'pagination-bar' },
              React.createElement('button', {
                className: 'page-btn',
                disabled: currentPage === 1,
                onClick: () => handlePageChange(currentPage - 1)
              }, '←'),
              React.createElement('div', { className: 'page-numbers' },
                Array.from({ length: Math.min(3, totalPages) }, (_, i) => {
                  let pageNum
                  if (totalPages <= 3) {
                    pageNum = i + 1
                  } else if (currentPage <= 2) {
                    pageNum = i + 1
                  } else if (currentPage >= totalPages - 1) {
                    pageNum = totalPages - 2 + i
                  } else {
                    pageNum = currentPage - 1 + i
                  }
                  return React.createElement('button', {
                    key: pageNum,
                    className: `page-number ${currentPage === pageNum ? 'active' : ''}`,
                    onClick: () => handlePageChange(pageNum)
                  }, pageNum)
                })
              ),
              React.createElement('button', {
                className: 'page-btn',
                disabled: currentPage === totalPages,
                onClick: () => handlePageChange(currentPage + 1)
              }, '→'),
              React.createElement('div', { className: 'page-size-select' },
                React.createElement('span', { className: 'page-size-label' }, '每页'),
                React.createElement('select', {
                  value: pageSize,
                  onChange: (e) => handlePageSizeChange(Number(e.target.value)),
                  className: 'page-size-dropdown'
                }, [10, 20, 30, 50, 100].map(size =>
                  React.createElement('option', { key: size, value: size }, size)
                )),
                React.createElement('span', { className: 'page-size-label' }, '条')
              )
            )
          ),
          React.createElement('div', { className: 'detail-panel' },
            currentItem.riddle 
              ? React.createElement('div', { className: 'content-card' },
                  React.createElement('div', { className: 'header' }, '歇后语'),
                  React.createElement('h1', { className: 'riddle-title' }, currentItem.riddle),
                  React.createElement('div', { className: 'divider' }),
                  React.createElement('div', { className: 'answer-section' },
                    React.createElement('span', { className: 'label' }, '【底】'),
                    React.createElement('span', { className: 'answer-text' }, currentItem.answer)
                  ),
                  React.createElement('div', { className: 'explanation' },
                    React.createElement('p', null, currentItem.explanation)
                  ),
                  React.createElement('div', { className: 'footer-stamp' }, '妙语连珠')
                )
              : React.createElement('div', { className: 'empty-hint' }, '请选择一条歇后语')
          )
        )
      }
      
      function App() {
        const [enterAction, setEnterAction] = useState({})
        
        useEffect(() => {
          if (typeof window.utools === 'undefined') {
            setEnterAction({ code: 'xiehouyu', type: 'text', payload: '' })
            return
          }
          window.utools.onPluginEnter((action) => {
            setEnterAction(action)
          })
        }, [])
        
        return React.createElement(Xiehouyu, { enterAction })
      }
      
      const root = createRoot(document.getElementById('root'))
      root.render(React.createElement(App))
    </script>
    <style>
      .utools-container {
        display: flex;
        height: 100vh;
        background-color: var(--bg-color);
        color: var(--primary-text);
      }
      
      .list-panel {
        width: 320px;
        border-right: 1px solid var(--border-color);
        background: rgba(255,255,255,0.5);
        display: flex;
        flex-direction: column;
      }
      
      .search-box {
        padding: 12px;
        border-bottom: 1px solid var(--border-color);
      }
      
      .search-input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 14px;
        outline: none;
        background: #fff;
      }
      
      .search-input:focus {
        border-color: var(--accent-color);
      }
      
      .list-info {
        padding: 8px 12px;
        font-size: 12px;
        color: #888;
        border-bottom: 1px solid var(--border-color);
        background: rgba(0,0,0,0.02);
      }
      
      .list-content {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }
      
      .list-item {
        padding: 12px 16px;
        cursor: pointer;
        border-bottom: 1px solid rgba(0,0,0,0.03);
        transition: all 0.15s;
      }
      
      .list-item:hover {
        background: var(--hover-bg);
      }
      
      .list-item.active {
        background: var(--active-item);
        border-left: 3px solid var(--accent-color);
        padding-left: 13px;
      }
      
      .list-item .riddle {
        font-weight: 500;
        font-size: 14px;
        line-height: 1.4;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      
      .no-result {
        padding: 40px 20px;
        text-align: center;
        color: #999;
        font-size: 14px;
      }
      
      .pagination-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 8px;
        border-top: 1px solid var(--border-color);
        background: rgba(255,255,255,0.8);
        gap: 12px;
      }
      
      .page-btn {
        width: 28px;
        height: 28px;
        border: 1px solid var(--border-color);
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .page-btn:hover:not(:disabled) {
        border-color: var(--accent-color);
        color: var(--accent-color);
      }
      
      .page-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      
      .page-numbers {
        display: flex;
        gap: 4px;
      }
      
      .page-number {
        min-width: 28px;
        height: 28px;
        padding: 0 6px;
        border: 1px solid var(--border-color);
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .page-number:hover {
        border-color: var(--accent-color);
      }
      
      .page-number.active {
        background: var(--accent-color);
        color: #fff;
        border-color: var(--accent-color);
      }
      
      .page-size-select {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-left: 8px;
      }
      
      .page-size-label {
        font-size: 12px;
        color: #666;
      }
      
      .page-size-dropdown {
        height: 28px;
        padding: 0 8px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: #fff;
        font-size: 13px;
        color: #333;
        cursor: pointer;
        outline: none;
      }
      
      .page-size-dropdown:hover {
        border-color: var(--accent-color);
      }
      
      .detail-panel {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
        background-image: radial-gradient(circle, #fdfcf9 0%, #f9f7f2 100%);
        overflow-y: auto;
      }
      
      .content-card {
        max-width: 500px;
        width: 100%;
        padding: 40px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        border-radius: 4px;
        position: relative;
        border: 1px solid var(--border-color);
      }
      
      .content-card .header {
        font-size: 12px;
        color: var(--accent-color);
        letter-spacing: 4px;
        margin-bottom: 20px;
        text-align: center;
      }
      
      .riddle-title {
        font-size: 28px;
        text-align: center;
        margin: 10px 0;
        font-weight: 800;
        line-height: 1.4;
      }
      
      .divider {
        width: 40px;
        height: 2px;
        background: var(--accent-color);
        margin: 20px auto;
      }
      
      .answer-section {
        text-align: center;
        margin: 30px 0;
      }
      
      .answer-section .label {
        font-size: 14px;
        color: #666;
        margin-right: 8px;
      }
      
      .answer-text {
        font-size: 36px;
        color: var(--accent-color);
        font-weight: 900;
      }
      
      .explanation {
        font-size: 14px;
        line-height: 1.8;
        color: #555;
        margin-top: 30px;
        border-top: 1px dashed var(--border-color);
        padding-top: 20px;
      }
      
      .footer-stamp {
        position: absolute;
        bottom: 20px;
        right: 20px;
        border: 2px solid var(--accent-color);
        color: var(--accent-color);
        padding: 2px 5px;
        font-size: 12px;
        transform: rotate(-15deg);
        opacity: 0.6;
        font-weight: bold;
      }
      
      .empty-hint {
        color: #999;
        font-size: 16px;
      }
      
      .list-content::-webkit-scrollbar {
        width: 6px;
      }
      
      .list-content::-webkit-scrollbar-track {
        background: transparent;
      }
      
      .list-content::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.15);
        border-radius: 3px;
      }
    </style>
  </body>
</html>
